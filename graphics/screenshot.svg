<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0C0C18"/>
    </linearGradient>
    <filter id="winShadow" x="-4%" y="-3%" width="110%" height="115%">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="btnGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="calloutGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="winClip">
      <rect width="1216" height="728" rx="14"/>
    </clipPath>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.2" fill="#FFFFFF" fill-opacity="0.018"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>

  <!-- ═══════════════ BROWSER WINDOW ═══════════════ -->
  <g transform="translate(32, 36)" filter="url(#winShadow)">
    <rect width="1216" height="728" rx="14" fill="#111120" stroke="#1C1C2E" stroke-width="1"/>

    <g clip-path="url(#winClip)">
      <!-- ─── Browser chrome ─── -->
      <rect width="1216" height="52" fill="#1C1C2E"/>
      <!-- Traffic lights -->
      <circle cx="28" cy="26" r="8" fill="#FF5F57"/>
      <circle cx="52" cy="26" r="8" fill="#FFBD2E"/>
      <circle cx="76" cy="26" r="8" fill="#27C840"/>
      <!-- Tab -->
      <rect x="106" y="12" width="220" height="28" rx="7" fill="#111120"/>
      <text x="186" y="30" text-anchor="middle"
            font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="12" fill="#8888AA">
        DuckDuckGo — coffee shops...
      </text>
      <!-- Address bar -->
      <rect x="340" y="12" width="580" height="28" rx="14" fill="#0C0C18"/>
      <!-- Lock icon -->
      <text x="362" y="30"
            font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="11" fill="#444466">
        🔒
      </text>
      <text x="380" y="30"
            font-family="'SF Mono','JetBrains Mono',monospace" font-size="11" fill="#555580">
        duckduckgo.com/?q=coffee+shops+near+me&amp;ia=web
      </text>

      <!-- ─── DDG Header ─── -->
      <rect y="52" width="1216" height="80" fill="#161626"/>
      <!-- DDG wordmark -->
      <text x="28" y="100"
            font-family="'SF Pro Display','Helvetica Neue',sans-serif"
            font-size="24" font-weight="700" fill="#DE5833">DuckDuckGo</text>
      <!-- Search bar -->
      <rect x="184" y="62" width="780" height="42" rx="21" fill="#1E1E30" stroke="#2C2C44" stroke-width="1"/>
      <!-- Search icon -->
      <text x="205" y="88"
            font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="16" fill="#444466">⌕</text>
      <text x="228" y="89"
            font-family="'SF Pro Text','Helvetica Neue',sans-serif"
            font-size="16" fill="#CCCCEE">coffee shops near me</text>
      <!-- X clear button -->
      <text x="940" y="88"
            font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#444466">✕</text>
      <!-- Separator -->
      <line x1="960" y1="66" x2="960" y2="96" stroke="#2C2C44" stroke-width="1"/>

      <!-- ★★★ THE "Search Google" BUTTON ★★★ -->
      <!-- Glow -->
      <rect x="972" y="62" width="212" height="42" rx="8"
            fill="#FF6600" filter="url(#btnGlow)" opacity="0.4"/>
      <!-- Button -->
      <rect x="972" y="62" width="212" height="42" rx="8" fill="#FF6600"/>
      <text x="1078" y="89" text-anchor="middle"
            font-family="'SF Pro Text','Helvetica Neue',sans-serif"
            font-size="15" font-weight="600" fill="#FFFFFF">Search Google</text>

      <!-- ─── Nav tabs ─── -->
      <rect y="132" width="1216" height="1" fill="#1E1E30"/>
      <rect y="133" width="1216" height="40" fill="#0E0E1C"/>
      <text x="28" y="158" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#EEEEFF" font-weight="600">Web</text>
      <rect x="28" y="170" width="26" height="3" rx="1.5" fill="#FF6600"/>
      <text x="70" y="158" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#44446A">Images</text>
      <text x="132" y="158" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#44446A">Videos</text>
      <text x="194" y="158" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#44446A">News</text>
      <text x="254" y="158" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#44446A">Maps</text>
      <rect y="173" width="1216" height="1" fill="#1A1A28"/>

      <!-- ─── Content area ─── -->
      <rect y="174" width="1216" height="554" fill="#0A0A16"/>

      <!-- Info bar -->
      <text x="28" y="200" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="12" fill="#333355">
        About 142,000,000 results (0.42 seconds)
      </text>

      <!-- ── Result 1 ── -->
      <text x="28" y="226" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#5555AA">
        yelp.com › coffee-shops › near-me
      </text>
      <text x="28" y="248" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="19" fill="#7A9FFF" font-weight="500">
        Best Coffee Shops Near Me — Yelp
      </text>
      <text x="28" y="268" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#7070A0">
        Find the top-rated coffee shops in your area. Read reviews, see photos, and get directions. Browse thousands
      </text>
      <text x="28" y="286" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#7070A0">
        of local coffee shops with hours, menus, and more.
      </text>

      <!-- Divider -->
      <line x1="28" y1="306" x2="780" y2="306" stroke="#161624" stroke-width="1"/>

      <!-- ── Result 2 ── -->
      <text x="28" y="328" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#5555AA">
        tripadvisor.com › restaurants › coffee
      </text>
      <text x="28" y="350" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="19" fill="#7A9FFF" font-weight="500">
        The 10 Best Coffee Shops Near You — TripAdvisor
      </text>
      <text x="28" y="370" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#7070A0">
        Travelers' Choice Awards coffee shops. Check availability, compare prices, and book your favorite
      </text>
      <text x="28" y="388" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#7070A0">
        local cafe with TripAdvisor — the world's largest travel site.
      </text>

      <!-- Divider -->
      <line x1="28" y1="408" x2="780" y2="408" stroke="#161624" stroke-width="1"/>

      <!-- ── Result 3 ── -->
      <text x="28" y="430" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#5555AA">
        timeout.com › coffee-near-me
      </text>
      <text x="28" y="452" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="19" fill="#7A9FFF" font-weight="500">
        The Best Coffee Near You Right Now — Time Out
      </text>
      <text x="28" y="472" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#7070A0">
        From artisan espresso to specialty pour-overs, discover the coffee shops our editors love most.
      </text>
      <text x="28" y="490" font-family="'SF Pro Text','Helvetica Neue',sans-serif" font-size="14" fill="#7070A0">
        Updated weekly with new picks from local insiders.
      </text>

      <!-- Divider -->
      <line x1="28" y1="510" x2="780" y2="510" stroke="#161624" stroke-width="1"/>

      <!-- ── Result 4 ── -->
      <text x="28" y="532" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#5555AA">
        google.com › maps › search › coffee
      </text>
      <rect x="28" y="540" width="420" height="18" rx="4" fill="#141422"/>
      <rect x="28" y="564" width="380" height="12" rx="4" fill="#101020"/>
      <rect x="28" y="582" width="400" height="12" rx="4" fill="#101020"/>

      <!-- ── Fade at bottom ── -->
      <rect y="600" width="1216" height="128" fill="url(#bottomFade)"/>
    </g>
  </g>

  <!-- ═══════════════ CALLOUT ANNOTATION ═══════════════ -->
  <!-- Arrow from button downward -->
  <!-- Callout box -->
  <rect x="920" y="662" width="340" height="74" rx="10"
        fill="#FF6600" filter="url(#calloutGlow)" opacity="0.12"/>
  <rect x="920" y="662" width="340" height="74" rx="10"
        fill="#0D0D1C" stroke="#FF6600" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Arrow line (from button area down to callout) -->
  <line x1="1078" y1="112" x2="1090" y2="654" stroke="#FF6600" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="6,4"/>
  <!-- Arrow head -->
  <polygon points="1090,662 1084,646 1096,646" fill="#FF6600" fill-opacity="0.7"/>

  <!-- Callout text -->
  <text x="1090" y="693" text-anchor="middle"
        font-family="'SF Pro Display','Helvetica Neue',sans-serif"
        font-size="16" font-weight="700" fill="#FFFFFF">Injected by unduck</text>
  <text x="1090" y="716" text-anchor="middle"
        font-family="'SF Pro Text','Helvetica Neue',sans-serif"
        font-size="13" fill="#9999CC">Sends your query to Google in one click</text>

  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0A0A16" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A16" stop-opacity="1"/>
    </linearGradient>
  </defs>
</svg>
